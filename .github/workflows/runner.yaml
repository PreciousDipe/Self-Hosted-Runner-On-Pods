name: Self Hosted Runners on Pods

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "This job runs on a self-hosted runner managed by actions runner controller"
          hostname
          cat /etc/os-release || true